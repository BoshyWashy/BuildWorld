# BuildWorld Configuration
# Primary and Secondary Colors (Minecraft color codes: 0-9, a-f)
Colors:
  Primary: "b"  # Aqua by default
  Secondary: "f" # White by default

# World Settings
World:
  DefaultDiameter: 100
  MaxWorldsPerPlayer: 1
  CreateCooldown: 120 # Seconds between world creations
  # CreationSpeedPercent controls the delay before world creation begins.
  # The actual world creation (Bukkit.createWorld) always runs on the main thread
  # because that is a Bukkit requirement. However, file preparation is done async,
  # and keepSpawnInMemory is disabled to minimise chunk generation work.
  #
  # This setting adds a tick delay before creation starts to give the server
  # time to breathe, and prevents two players from triggering creation at the
  # same time:
  #   100 =   0 ticks delay (immediate — may cause a brief TPS spike)
  #    75 =  25 ticks (~1.25 seconds)
  #    50 =  50 ticks (~2.5 seconds)
  #    25 =  75 ticks (~3.75 seconds)
  #    10 =  90 ticks (~4.5 seconds)
  #     1 =  99 ticks (~5 seconds)
  #
  # Recommended: 50 for busy servers. This does NOT make creation slower for
  # the player — it just staggers multiple creations so the server handles
  # them one at a time.
  CreationSpeedPercent: 50
  VoidWorld:
    GenerateStructures: false
    AllowEntities: false
  Border:
    Enabled: true

# WorldGuard Settings
WorldGuard:
  DefaultFlags:
    passthrough: "deny"
    build: "deny"
    block-break: "deny"
    block-place: "deny"
    use: "allow"
    chest-access: "deny"
    pvp: "deny"

# Online Expansion System
OnlineWorldExpansion:
  Enabled: true
  BlockGainPerMin: 20
  CheckInterval: 60 # seconds

# Member/Owner Permissions (Nested under buildworld.member and buildworld.owner)
Permissions:
  Member:
    - "worldedit.*"
    - "axiom.*"
    - "arceon.*"
    - "//confirm"
  Owner:
    - "worldedit.*"
    - "axiom.*"
    - "arceon.*"
    - "//confirm"
    - "buildworld.admin.memberedit"

# Messages (Use %primary% and %secondary% for colors)
Messages:
  Title:
    FadeIn: 20
    Stay: 60
    FadeOut: 20
  Welcome:
    - "&l%primary%&m= = = = = = = = = = = = = = = = = = = = = = = ="
    - "%primary%Welcome to %secondary%<world>%primary%!"
    - ""
    - "%primary%World Edit and Axiom are recommended skills to learn to build."
    - ""
    - "%primary%Use %secondary%/bw help %primary%to add members to help build!"
    - ""
    - "%primary%&lHappy Building!"
    - ""
    - "&l%primary%&m= = = = = = = = = = = = = = = = = = = = = = = ="
  VisitorWelcome:
    - "&l%primary%&m= = = = = = = = = = = = = = = = = = = = = = = ="
    - " "
    - "%primary%Welcome to %secondary%<world>%primary%!"
    - " "
    - "%primary%&lEnjoy the visit!!"
    - " "
    - "&l%primary%&m= = = = = = = = = = = = = = = = = = = = = = = ="
  SpawnWorldWelcome:
    - "&l%primary%&m= = = = = = = = = = = = = = = = = = = = = = = ="
    - " "
    - "%primary%&lWelcome to the BuildWorld System!"
    - " "
    - "%secondary%Create your own world with /bw create_world"
    - "%secondary%Visit other worlds with /bw menu"
    - " "
    - "&l%primary%&m= = = = = = = = = = = = = = = = = = = = = = = ="

# Tutorials for /bw help <topic>
Tutorials:
  commands: "%primary%Use /bw help commands to see all available commands!"

# Database
Database:
  Type: SQLITE # or MYSQL
  Host: localhost
  Port: 3306
  Database: buildworld
  Username: root
  Password: password

# Plugin Maintenance Mode
Maintenance:
  Enabled: false
  KickMessage: "&cThe BuildWorld system is currently under maintenance. Please try again later."